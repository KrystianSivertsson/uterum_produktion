<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1a2235" />
    <meta name="description" content="Produktlagerhantering för Nordiska Uterum" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Lagersystem" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Android -->
    <meta name="mobile-web-app-capable" content="yes" />

    <title>Nordiska Uterum – Lagersystem</title>

    <style>
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; padding: 0; background: #1a2235; }
      body { overflow: hidden; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          const base = window.location.pathname.startsWith('/UterumLager') ? '/UterumLager' : '';
          navigator.serviceWorker.register(base + '/sw.js', { scope: base + '/' }).catch(() => {});
        });
      }
    </script>
  </body>
</html>
